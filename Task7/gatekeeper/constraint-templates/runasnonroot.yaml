apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirerunasnonroot
spec:
  crd:
    spec:
      names:
        kind: K8sRequireRunAsNonRoot
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirerunasnonroot

        pod_nonroot {
          input.review.object.spec.securityContext.runAsNonRoot == true
        }

        container_nonroot(c) {
          c.securityContext.runAsNonRoot == true
        }
        container_nonroot(_) {
          pod_nonroot
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          not container_nonroot(c)
          msg := sprintf("container %v must set runAsNonRoot: true (pod or container level)", [c.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          c.securityContext.runAsUser == 0
          msg := sprintf("container %v must not run as UID 0", [c.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          not c.securityContext.readOnlyRootFilesystem == true
          msg := sprintf("container %v must set readOnlyRootFilesystem: true", [c.name])
        }
